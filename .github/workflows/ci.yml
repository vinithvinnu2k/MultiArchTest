name: Multi-Arch .NET Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Build x64
        run: dotnet build MultiArchTest.csproj -c Debug -r win-x64

      - name: Build ARM64
        run: dotnet build MultiArchTest.csproj -c Debug -r win-arm64

      - name: Print hashes
        run: |
          Write-Host "x64 hash:"
          Get-FileHash MultiArchTest\bin\Debug\net10.0\win-x64\MultiArchTest.dll
          Write-Host "ARM64 hash:"
          Get-FileHash MultiArchTest\bin\Debug\net10.0\win-arm64\MultiArchTest.dll
        shell: pwsh
